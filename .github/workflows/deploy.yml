name: Deploy to Cloudflare Pages

# push 到 main 即自动构建并部署到 Cloudflare Pages（项目为 Direct Upload 类型，
# 不走 CF 自带的 Git 集成，而是在 CI 里用 wrangler 上传 dist）。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy dist --project-name=ai-daily-site --branch=main --commit-dirty=true
