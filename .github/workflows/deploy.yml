name: Deploy to Cloudflare Pages

# push 到 main 即自动构建并部署到 Cloudflare Pages（项目为 Direct Upload 类型，
# 不走 CF 自带的 Git 集成，而是在 CI 里用 wrangler 上传 dist）。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy dist --project-name=ai-daily-site --branch=main --commit-dirty=true

      # 构建/部署失败时推一条到微信（Server酱）。没配 SENDKEY 就静默跳过，不影响别的。
      # 动态值都走 env 传入，避免 commit message 里的特殊字符注入到 shell。
      - name: Notify on failure
        if: failure()
        env:
          SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$SENDKEY" ] && { echo "未配置 SERVERCHAN_SENDKEY，跳过通知"; exit 0; }
          curl -s "https://sctapi.ftqq.com/${SENDKEY}.send" \
            --data-urlencode "title=🚨 AI Daily 部署失败，线上未更新" \
            --data-urlencode "desp=提交：${COMMIT_MSG}

构建或部署失败，本次改动**没有上线**。多半是文章 frontmatter 格式有误，修好后重新保存即可。

查看日志：${RUN_URL}" > /dev/null
          echo "已推送失败通知"
